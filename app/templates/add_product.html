{% extends "base.html" %}

{% block title %}
Add Product
{% endblock %}

{% block content %}

<h2 class="mb-4">Add Product</h2>

<form method="post" action="/products/add">

    <div class="row">

        <div class="col-md-6 mb-3">
            <label>Product Name</label>
            <input type="text" name="product_name" class="form-control" required>
        </div>

        <div class="col-md-6 mb-3">
            <label>Category</label>
            <select name="category" class="form-control" required>
                <option value="">Select</option>
                <option>Laptop</option>
                <option>Desktop</option>
                <option>Monitor</option>
                <option>Printer</option>
                <option>Networking Device</option>
                <option>CCTV</option>
                <option>Storage Device</option>
                <option>Software License</option>
                <option>Accessory</option>
                <option>Office Asset</option>
            </select>
        </div>

        <div class="col-md-6 mb-3">
            <label>Brand</label>
            <input type="text" name="brand" class="form-control">
        </div>

        <div class="col-md-6 mb-3">
            <label>Model Number</label>
            <input type="text" name="model_number" class="form-control">
        </div>

        <div class="col-md-6 mb-3">
            <label>Serial Number</label>
            <input type="text" name="serial_number" class="form-control">
        </div>

        <div class="col-md-6 mb-3">
            <label>Product Type</label>
            <select name="product_type" class="form-control">
                <option>Stock Item</option>
                <option>Fixed Asset</option>
                <option>Consumable</option>
                <option>License</option>
            </select>
        </div>

        <div class="col-md-6 mb-3">
            <label>Unit Price</label>
            <input type="number" step="0.01" name="unit_price" class="form-control">
        </div>

        <div class="col-md-6 mb-3">
            <label>Current Quantity</label>
            <input type="number" name="current_quantity" class="form-control">
        </div>

        <div class="col-md-6 mb-3">
            <label>Minimum Quantity</label>
            <input type="number" name="minimum_quantity" class="form-control">
        </div>

        <div class="col-md-6 mb-3">
            <label>Warranty Expiry</label>
            <input type="date" name="warranty_expiry" class="form-control">
        </div>

    </div>

    <button class="btn btn-primary">
        Save Product
    </button>

</form>

{% endblock %}
