{% extends "base.html" %}

{% block title %}
Add Stock
{% endblock %}

{% block content %}

<h2 class="mb-4">Add Stock</h2>

<form method="post" action="/stock/add">

    <div class="mb-3">
        <label>Product</label>

        <select
            name="product_id"
            class="form-control"
            required
        >
            {% for product in products %}

            <option value="{{ product.id }}">
                {{ product.product_name }}
            </option>

            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label>Quantity Added</label>

        <input
            type="number"
            name="quantity_added"
            class="form-control"
            required
        >
    </div>

    <div class="mb-3">
        <label>Vendor Name</label>

        <input
            type="text"
            name="vendor_name"
            class="form-control"
        >
    </div>

    <div class="mb-3">
        <label>Purchase Date</label>

        <input
            type="date"
            name="purchase_date"
            class="form-control"
        >
    </div>

    <div class="mb-3">
        <label>Invoice Number</label>

        <input
            type="text"
            name="invoice_number"
            class="form-control"
        >
    </div>

    <div class="mb-3">
        <label>Purchase Amount</label>

        <input
            type="number"
            step="0.01"
            name="purchase_amount"
            class="form-control"
        >
    </div>

    <div class="mb-3">
        <label>Remarks</label>

        <textarea
            name="remarks"
            class="form-control"
        ></textarea>
    </div>

    <button class="btn btn-success">
        Add Stock
    </button>

</form>

{% endblock %}
